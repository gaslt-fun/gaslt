name: java

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  java:
    name: java sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./java
    steps:
      - uses: actions/checkout@v4
      - name: set up jdk 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: compile, test, and build jars
        run: mvn -B -ntp verify
      - name: cli smoke test
        run: java -jar cli/target/gaslt-cli.jar --help
      - name: cli derives a pda offline
        run: java -jar cli/target/gaslt-cli.jar pda --sponsor So11111111111111111111111111111111111111112 --nonce 7
