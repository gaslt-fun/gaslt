name: java

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  java:
    name: java sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./java
    steps:
      - uses: actions/checkout@v4
      - name: set up jdk 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: compile and test
        run: mvn -B -ntp verify
